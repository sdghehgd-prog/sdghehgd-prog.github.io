<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سامي الجحيش | مؤلف وباحث لغوي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #1a2a3a; /* لون داكن فخم */
            --accent-color: #8e44ad;  /* لون بنفسجي هادئ للتمييز */
            --bg-color: #ffffff;      /* الخلفية البيضاء التي تفضلها */
            --text-color: #333333;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            color: var(--text-color);
            line-height: 1.8;
        }

        /* الهيدر أو الواجهة */
        header {
            text-align: center;
            padding: 80px 20px;
            border-bottom: 1px solid #eee;
        }

        .logo-text {
            font-size: 3.5rem;
            margin: 0;
            color: var(--primary-color);
            /* تخيل هذا بالخط الديواني */
        }

        .subtitle {
            font-size: 1.3rem;
            color: #666;
            margin-top: 10px;
        }

        .container {
            max-width: 900px;
            margin: auto;
            padding: 40px 20px;
        }

        /* قسم الكتاب */
        .book-card {
            display: flex;
            align-items: center;
            gap: 40px;
            padding: 30px;
            border: 1px solid #efefef;
            border-radius: 20px;
            background: #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }

        .book-img {
            width: 250px;
            height: 380px;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            border: 1px solid #ddd;
            text-align: center;
            padding: 15px;
        }

        .book-details h2 {
            color: var(--primary-color);
            margin-top: 0;
        }

        /* التواصل الاجتماعي */
        .social-section {
            text-align: center;
            margin-top: 60px;
            padding: 40px 0;
        }

        .social-icons a {
            font-size: 2rem;
            margin: 0 20px;
            color: var(--primary-color);
            text-decoration: none;
            transition: 0.3s;
        }

        .social-icons a:hover {
            color: var(--accent-color);
            transform: translateY(-5px);
        }

        footer {
            text-align: center;
            padding: 30px;
            background: #fdfdfd;
            font-size: 0.9rem;
            color: #999;
        }

        @media (max-width: 768px) {
            .book-card { flex-direction: column; text-align: center; }
            .logo-text { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

<header>
    <h1 class="logo-text">سامي الجحيش</h1>
    <p class="subtitle">باحث ومؤلف في علوم اللغة العربية</p>
</header>

<div class="container">
    
    <section class="book-card">
        <div class="book-img">
            <strong>غلاف كتاب<br>"عنهُ هذا النحو"</strong>
        </div>
        <div class="book-details">
            <h2>جديد المؤلف: عنهُ هذا النحو</h2>
            <p>إصدار لغوي فريد يتناول قواعد النحو برؤية تحليلية جديدة، يهدف إلى تبسيط اللغة مع الحفاظ على عمقها وأصالتها.</p>
            <p style="color: var(--accent-color); font-weight: bold;">قريباً في جميع المكتبات</p>
        </div>
    </section>

    <section class="social-section">
        <h3>تواصل معي</h3>
        <div class="social-icons">
            <a href="#" title="واتساب"><i class="fab fa-whatsapp"></i></a>
            <a href="#" title="تيك توك"><i class="fab fa-tiktok"></i></a>
            <a href="#" title="إنستغرام"><i class="fab fa-instagram"></i></a>
        </div>
    </section>

</div>

<footer>
    <p>جميع الحقوق محفوظة © سامي الجحيش 2026</p>
</footer>

</body>
</html>
